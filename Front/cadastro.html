<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cadastro - Insurance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="cadastro-container">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            <h1>Insurance</h1>
        </div>

        <h2>Criar conta</h2>
        <p class="subtitle">Preencha os dados abaixo para começar</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="cadastroForm">
            <div class="row-2cols">
                <div class="input-group">
                    <label>Nome completo</label>
                    <div class="input-wrapper">
                        <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>CPF</label>
                    <div class="input-wrapper">
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                </div>
            </div>

            <div class="row-2cols">
                <div class="input-group">
                    <label>Telefone</label>
                    <div class="input-wrapper">
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Data de nascimento</label>
                    <div class="input-wrapper">
                        <input type="date" id="nascimento" required>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Crie uma senha" required>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
                <div class="password-strength" id="strengthText">Fraca</div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>

            <div class="input-group">
                <label>Confirmar senha</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirme sua senha" required>
                    <button type="button" class="toggle-password" id="toggleConfirmPassword">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="register-btn">Cadastrar</button>
        </form>

        <div class="login-link">
            Já tem uma conta? <a href="login.html">Faça login</a>
        </div>
        <div class="back-home">
            <a href="index.html">← Voltar para a página inicial</a>
        </div>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const cadastroForm = document.getElementById('cadastroForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const cpfInput = document.getElementById('cpf');
        const telefoneInput = document.getElementById('telefone');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        cpfInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                e.target.value = value;
            }
        });

        telefoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{5})(\d)/, '$1-$2');
                e.target.value = value;
            }
        });

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        toggleConfirmPassword.addEventListener('click', function() {
            const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            let percentage = (strength / 5) * 100;
            strengthFill.style.width = percentage + '%';
            
            if (percentage <= 20) {
                strengthFill.style.background = '#dc2626';
                strengthText.textContent = 'Muito fraca';
                strengthText.style.color = '#dc2626';
            } else if (percentage <= 40) {
                strengthFill.style.background = '#f97316';
                strengthText.textContent = 'Fraca';
                strengthText.style.color = '#f97316';
            } else if (percentage <= 60) {
                strengthFill.style.background = '#eab308';
                strengthText.textContent = 'Média';
                strengthText.style.color = '#eab308';
            } else if (percentage <= 80) {
                strengthFill.style.background = '#22c55e';
                strengthText.textContent = 'Forte';
                strengthText.style.color = '#22c55e';
            } else {
                strengthFill.style.background = '#16a34a';
                strengthText.textContent = 'Muito forte';
                strengthText.style.color = '#16a34a';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }

        cadastroForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const nascimento = document.getElementById('nascimento').value;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!nome) {
                showError('Por favor, informe seu nome completo.');
                return;
            }

            if (!cpf || cpf.replace(/\D/g, '').length !== 11) {
                showError('Por favor, informe um CPF válido.');
                return;
            }

            if (!telefone || telefone.replace(/\D/g, '').length < 10) {
                showError('Por favor, informe um telefone válido.');
                return;
            }

            if (!nascimento) {
                showError('Por favor, informe sua data de nascimento.');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError('Por favor, informe um e-mail válido.');
                return;
            }

            if (password.length < 6) {
                showError('A senha deve ter no mínimo 6 caracteres.');
                return;
            }

            if (password !== confirmPassword) {
                showError('As senhas não conferem.');
                return;
            }

            const dadosCadastro = {
                nome: nome,
                cpf: cpf.replace(/\D/g, ''),
                telefone: telefone.replace(/\D/g, ''),
                dataNascimento: nascimento,
                email: email,
                senha: password
            };

            console.log('Cadastro:', dadosCadastro);
            
            showSuccess('Cadastro realizado com sucesso! Redirecionando...');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
