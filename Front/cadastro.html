<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cadastro - Insurance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loader-logo">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div class="loader-text">Carregando<span class="loader-dots"></span></div>
        <div class="loader-spinner"></div>
    </div>

    <div class="cadastro-container">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            <h1>Insurance</h1>
        </div>
        <h2>Criar conta</h2>
        <p class="subtitle">Preencha os dados abaixo para começar</p>
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        <form id="cadastroForm">
            <div class="row-2cols">
                <div class="input-group">
                    <label>Nome completo</label>
                    <div class="input-wrapper">
                        <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>CPF</label>
                    <div class="input-wrapper">
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                </div>
            </div>
            <div class="row-2cols">
                <div class="input-group">
                    <label>Telefone</label>
                    <div class="input-wrapper">
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Data de nascimento</label>
                    <div class="input-wrapper">
                        <input type="date" id="nascimento" required>
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Crie uma senha" required>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
                <div class="password-strength" id="strengthText">Fraca</div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>
            <div class="input-group">
                <label>Confirmar senha</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirme sua senha" required>
                    <button type="button" class="toggle-password" id="toggleConfirmPassword">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="register-btn">Cadastrar</button>
        </form>
        <div class="login-link">
            Já tem uma conta? <a href="login.html">Faça login</a>
        </div>
        <div class="back-home">
            <a href="index.html">← Voltar para a página inicial</a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
