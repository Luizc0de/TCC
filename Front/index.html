<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance - Proteja seu Futuro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-diagonal-stripes">
        <div class="white-card">
            <!-- HEADER -->
            <div class="header">
                <div class="logo-placeholder">
                    <i class="fas fa-shield-heart"></i>
                </div>
                <h1>insurance: Seguro de vida e Bens materiais</h1>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="hero-text">
                    <h2>Proteja o seu amanhã, vivendo o hoje com tranquilidade.</h2>
                    <p>Soluções completas em seguros para garantir a segurança e o bem-estar de quem você mais ama.</p>
                </div>

                <!-- CARDS GRID -->
                <div class="cards-grid">
                    <!-- Card 1: Seguro de Vida -->
                    <div class="insurance-card" data-plan="vida">
                        <div class="card-icon">
                            <i class="fas fa-heartbeat"></i>
                        </div>
                        <h3>Seguro de vida</h3>
                        <button class="btn-planos" data-plan="vida">Ver planos <i class="fas fa-arrow-right"></i></button>
                    </div>

                    <!-- Card 2: Seguro de Saúde -->
                    <div class="insurance-card" data-plan="saude">
                        <div class="card-icon">
                            <i class="fas fa-stethoscope"></i>
                        </div>
                        <h3>Seguro de Saúde</h3>
                        <button class="btn-planos" data-plan="saude">Ver planos <i class="fas fa-arrow-right"></i></button>
                    </div>

                    <!-- Card 3: Seguro de Acidentes -->
                    <div class="insurance-card" data-plan="acidentes">
                        <div class="card-icon">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <h3>Seguro de Acidentes</h3>
                        <button class="btn-planos" data-plan="acidentes">Ver planos <i class="fas fa-arrow-right"></i></button>
                    </div>

                    <!-- Card 4: Previdência -->
                    <div class="insurance-card" data-plan="previdencia">
                        <div class="card-icon">
                            <i class="fas fa-piggy-bank"></i>
                        </div>
                        <h3>Previdência</h3>
                        <button class="btn-planos" data-plan="previdencia">Ver planos <i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL (JavaScript) -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h3 id="modal-title"></h3>
            <p id="modal-description"></p>
            <button class="modal-btn">Fechar</button>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast">✅ Plano selecionado com sucesso!</div>

    <script src="script.js"></script>
</body>
</html>
